name: Hyundai Card Auto Sync

on:
  schedule:
    - cron: '0 23 * * *' # 한국 시간 기준 매일 오전 8시 (UTC 23:00)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas selenium webdriver-manager gspread oauth2client lxml

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Scraper
        env:
          GOOGLE_SERVICE_KEY: ${{ secrets.GOOGLE_SERVICE_KEY }}
        run: python auto_scraping.py
